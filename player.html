<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "playerstyle.css">
    <script src = "playerscript.js" defer></script>
</head>
<body>
    <h1><center>Dash Player</center></h1>
    
    <div class="drop-area">
    <p class="song-title">Drag & Drop a .mp3 file here to play!</p>
    </div>
    
    <!-- buttons for the media controls and audio engine -->
     <center>
    <button class="media-controls" id="skipback">Back</button>
    <button class="media-controls" id="play">Play</button>
    <button class="media-controls" id="skipnext">Next</button>
    <audio id="audioplayer" src="Music/"></audio>
     </center>
</body>
</html>
